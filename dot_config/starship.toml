# Starship prompt configuration
# Docs: https://starship.rs/config/

"$schema" = "https://starship.rs/config-schema.json"

add_newline = true
command_timeout = 1000
palette = "default"

format = """
[#](bold blue) $username @ $hostname $directory$git_branch$git_status$custom$git_state$time
$character"""

[palettes.default]
prompt   = "red"
user     = "cyan"
host     = "green"
path     = "yellow"
branch   = "cyan"
dirty    = "red"
clean    = "green"
time     = "white"

# ---- prompt character ----
[character]
success_symbol = "[\\$](bold prompt)"
error_symbol   = "[\\$](bold prompt)"
vicmd_symbol   = "[\\$](bold prompt)"

# ---- identity ----
[username]
show_always = true
style_user  = "bold user"
format      = "[$user]($style)"

[hostname]
ssh_only = false
style    = "bold host"
format   = "[$hostname]($style)"

# ---- location ----
[directory]
style             = "bold path"
truncation_length = 4
truncation_symbol = "…/"
truncate_to_repo  = false
read_only         = " "

# ---- git ----
[git_branch]
style  = "bold branch"
format = "on [$branch]($style) "

[git_status]
style        = "bold dirty"
format       = '([$all_status$ahead_behind]($style) )'
conflicted   = "="
ahead        = "⇡"
behind       = "⇣"
diverged     = "⇕"
untracked    = "?"
stashed      = "\\$"
modified     = "!"
staged       = "+"
renamed      = "»"
deleted      = "✘"

[custom.git_clean]
description  = "Show ✓ when working tree is clean and synced with remote"
require_repo = true
command      = "echo ✓"
when         = 'test -z "$(git status --porcelain)" && git diff --quiet @{u}..'
style        = "bold clean"
format       = "[$output]($style) "

# ---- metadata ----
[time]
disabled    = false
use_12hr    = false
time_format = "%H:%M:%S"
style       = "bold time"
format      = "\\[[$time]($style)\\]"
